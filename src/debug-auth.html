<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resilio Auth Debug Tool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #667eea;
      margin-bottom: 1.5rem;
      font-size: 2rem;
    }
    h2 {
      color: #333;
      margin: 1.5rem 0 1rem;
      font-size: 1.25rem;
      border-bottom: 2px solid #667eea;
      padding-bottom: 0.5rem;
    }
    .status {
      padding: 1rem;
      border-radius: 0.5rem;
      margin: 1rem 0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 1rem;
      margin: 0.5rem 0.5rem 0.5rem 0;
      transition: all 0.2s;
    }
    button:hover { background: #5568d3; transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    
    pre {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin: 1rem 0;
      border: 1px solid #dee2e6;
    }
    
    .token-display {
      word-break: break-all;
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 0.5rem;
      margin: 1rem 0;
      border-left: 4px solid #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Resilio Authentication Debugger</h1>
    <p>This tool helps diagnose authentication issues with your Resilio app.</p>
    
    <h2>📋 Step 1: Check LocalStorage</h2>
    <button onclick="checkLocalStorage()">Check Stored Tokens</button>
    <div id="localStorageResult"></div>
    
    <h2>🧪 Step 2: Test API Call</h2>
    <button onclick="testFutureMessageAPI()">Test Future Message Creation</button>
    <button onclick="testReminderAPI()">Test Reminder Creation</button>
    <div id="apiTestResult"></div>
    
    <h2>🔐 Step 3: Validate Token</h2>
    <button onclick="validateToken()">Validate Access Token</button>
    <div id="tokenValidationResult"></div>
    
    <h2>🔄 Step 4: Refresh Session</h2>
    <button onclick="refreshSession()">Get New Session</button>
    <div id="refreshResult"></div>
    
    <h2>🧹 Clear & Reset</h2>
    <button onclick="clearStorage()" style="background: #dc3545;">Clear All Tokens</button>
    <div id="clearResult"></div>
  </div>

  <script>
    const projectId = 'wuzbuxeqqubolujjtizc';
    const publicAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1emJ1eGVxcXVib2x1amp0aXpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzI3OTE3NTYsImV4cCI6MjA0ODM2Nzc1Nn0.wCJkQJT5Ae9EjJIHq1jG0RCK91d4bpXJALy0rUH_zqI';

    function checkLocalStorage() {
      const result = document.getElementById('localStorageResult');
      const accessToken = localStorage.getItem('resilio_access_token');
      const userId = localStorage.getItem('resilio_user_id');
      const userName = localStorage.getItem('resilio_user_name');
      const userEmail = localStorage.getItem('resilio_user_email');
      
      if (accessToken && userId) {
        result.innerHTML = `
          <div class="status success">
            ✅ Tokens Found!
            <div class="token-display">
              <strong>Access Token:</strong> ${accessToken.substring(0, 50)}...<br>
              <strong>User ID:</strong> ${userId}<br>
              <strong>User Name:</strong> ${userName}<br>
              <strong>User Email:</strong> ${userEmail}
            </div>
          </div>
        `;
      } else {
        result.innerHTML = `
          <div class="status error">
            ❌ No tokens found in localStorage!
            <p style="margin-top: 1rem;">You need to log in to Resilio first.</p>
          </div>
        `;
      }
    }

    async function testFutureMessageAPI() {
      const result = document.getElementById('apiTestResult');
      result.innerHTML = '<div class="status info">⏳ Testing API...</div>';
      
      const accessToken = localStorage.getItem('resilio_access_token');
      
      if (!accessToken) {
        result.innerHTML = '<div class="status error">❌ No access token found! Please log in first.</div>';
        return;
      }
      
      try {
        const testMessage = {
          id: Date.now().toString(),
          message: 'Test message from debugger',
          scheduledDate: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString().split('T')[0],
          scheduledTime: '09:00',
          created: new Date().toISOString()
        };
        
        const response = await fetch(
          `https://${projectId}.supabase.co/functions/v1/make-server-40d4d8fd/future-messages`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${accessToken}`
            },
            body: JSON.stringify(testMessage)
          }
        );
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          result.innerHTML = `
            <div class="status success">
              ✅ API Test Successful!
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
        } else {
          result.innerHTML = `
            <div class="status error">
              ❌ API Test Failed (${response.status})
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
        }
      } catch (error) {
        result.innerHTML = `
          <div class="status error">
            ❌ Error: ${error.message}
            <pre>${error.stack}</pre>
          </div>
        `;
      }
    }

    async function testReminderAPI() {
      const result = document.getElementById('apiTestResult');
      result.innerHTML = '<div class="status info">⏳ Testing Reminder API...</div>';
      
      const accessToken = localStorage.getItem('resilio_access_token');
      
      if (!accessToken) {
        result.innerHTML = '<div class="status error">❌ No access token found! Please log in first.</div>';
        return;
      }
      
      try {
        const testReminder = {
          id: Date.now().toString(),
          task: 'Test reminder from debugger',
          date: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString().split('T')[0],
          time: '14:00',
          completed: false,
          created: new Date().toISOString()
        };
        
        const response = await fetch(
          `https://${projectId}.supabase.co/functions/v1/make-server-40d4d8fd/reminders`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${accessToken}`
            },
            body: JSON.stringify(testReminder)
          }
        );
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          result.innerHTML = `
            <div class="status success">
              ✅ Reminder API Test Successful!
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
        } else {
          result.innerHTML = `
            <div class="status error">
              ❌ Reminder API Test Failed (${response.status})
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
        }
      } catch (error) {
        result.innerHTML = `
          <div class="status error">
            ❌ Error: ${error.message}
            <pre>${error.stack}</pre>
          </div>
        `;
      }
    }

    async function validateToken() {
      const result = document.getElementById('tokenValidationResult');
      result.innerHTML = '<div class="status info">⏳ Validating token...</div>';
      
      const accessToken = localStorage.getItem('resilio_access_token');
      
      if (!accessToken) {
        result.innerHTML = '<div class="status error">❌ No access token found!</div>';
        return;
      }
      
      try {
        const response = await fetch(
          `https://${projectId}.supabase.co/functions/v1/make-server-40d4d8fd/user/verify`,
          {
            method: 'GET',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${accessToken}`
            }
          }
        );
        
        const data = await response.json();
        
        if (response.ok && data.valid) {
          result.innerHTML = `
            <div class="status success">
              ✅ Token is Valid!
              <pre>${JSON.stringify(data, null, 2)}</pre>
            </div>
          `;
        } else {
          result.innerHTML = `
            <div class="status error">
              ❌ Token is Invalid or Expired
              <pre>${JSON.stringify(data, null, 2)}</pre>
              <p style="margin-top: 1rem;">Please log out and log back in to Resilio.</p>
            </div>
          `;
        }
      } catch (error) {
        result.innerHTML = `
          <div class="status error">
            ❌ Error: ${error.message}
          </div>
        `;
      }
    }

    async function refreshSession() {
      const result = document.getElementById('refreshResult');
      result.innerHTML = '<div class="status warning">⚠️ This feature requires you to log in again through the main Resilio app.</div>';
    }

    function clearStorage() {
      localStorage.removeItem('resilio_access_token');
      localStorage.removeItem('resilio_user_id');
      localStorage.removeItem('resilio_user_name');
      localStorage.removeItem('resilio_user_email');
      
      const result = document.getElementById('clearResult');
      result.innerHTML = `
        <div class="status success">
          ✅ All tokens cleared!
          <p style="margin-top: 1rem;">Please log in to Resilio again to get a new session.</p>
        </div>
      `;
      
      setTimeout(() => checkLocalStorage(), 100);
    }

    // Auto-check on load
    window.addEventListener('load', checkLocalStorage);
  </script>
</body>
</html>
