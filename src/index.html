<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- Force cache clear with version -->
  <meta name="app-version" content="2.0-no-wasm">
  <title>Resilio - Personal Journal</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      width: 100%;
      height: 100vh;
    }
    .loading {
      text-align: center;
      color: white;
      padding: 40px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <h2>Loading Resilio...</h2>
      <p>Starting fresh - no WebAssembly</p>
    </div>
  </div>
  
  <script>
    // CRITICAL: Disable WebAssembly BEFORE anything else loads
    if (typeof WebAssembly !== 'undefined') {
      console.warn('🚫 WebAssembly detected - DISABLING NOW');
      
      // Completely remove WebAssembly from window
      Object.defineProperty(window, 'WebAssembly', {
        get: function() {
          console.warn('⚠️ WebAssembly access blocked');
          return undefined;
        },
        set: function() {
          console.warn('⚠️ WebAssembly modification blocked');
        },
        configurable: false
      });
      
      console.log('✅ WebAssembly completely disabled');
    }
    
    // AGGRESSIVE cache clearing - v3.0
    (async function() {
      try {
        console.log('🧹 Starting ULTRA aggressive cache clear...');
        
        // Unregister ALL existing service workers FIRST
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(reg => {
            console.log('🗑️ Unregistering old service worker');
            return reg.unregister();
          }));
          console.log('✅ Unregistered', registrations.length, 'old service workers');
        }
        
        // Clear ALL caches
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(name => {
            console.log('🗑️ Deleting cache:', name);
            return caches.delete(name);
          }));
          console.log('✅ Cleared', cacheNames.length, 'caches');
        }
        
        // Register NEW anti-WASM service worker
        if ('serviceWorker' in navigator) {
          try {
            const registration = await navigator.serviceWorker.register('/sw-block-wasm.js', {
              scope: '/',
              updateViaCache: 'none'
            });
            console.log('✅ Anti-WASM Service Worker registered');
            
            // Force update
            await registration.update();
            
            // Wait for it to be active
            if (registration.active) {
              console.log('✅ Service Worker is active and blocking WASM');
            }
          } catch (swError) {
            console.warn('Service Worker registration failed (non-critical):', swError);
          }
        }
        
        // Clear localStorage cache flags
        localStorage.removeItem('cache_cleared');
        localStorage.removeItem('cache_cleared_v2');
        localStorage.setItem('cache_cleared_v3', Date.now().toString());
        localStorage.setItem('app_version', '2.0-no-wasm');
        console.log('✅ Ultra aggressive cache clear complete - v3.0');
        
      } catch (error) {
        console.warn('Cache clearing error (non-critical):', error);
      }
    })();
    
    // ENHANCED Global error suppression - CAPTURE PHASE
    const suppressError = (event) => {
      const msg = String(event.message || event.reason || '');
      if (msg.includes('WebAssembly') || 
          msg.includes('wasm') || 
          msg.includes('Network error') ||
          msg.includes('compilation aborted') ||
          msg.includes('Response body loading was aborted')) {
        console.warn('⚠️ Error suppressed (non-critical):', msg.substring(0, 100));
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
        return false;
      }
    };
    
    window.addEventListener('error', suppressError, true);
    window.addEventListener('unhandledrejection', (event) => {
      const reason = String(event.reason || '');
      if (reason.includes('WebAssembly') || 
          reason.includes('wasm') || 
          reason.includes('Network error') ||
          reason.includes('compilation aborted') ||
          reason.includes('aborted')) {
        console.warn('⚠️ Promise rejection suppressed:', reason.substring(0, 100));
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
        return false;
      }
    }, true);
    
    // Intercept fetch to block WASM files
    const originalFetch = window.fetch;
    window.fetch = function(...args) {
      const url = args[0]?.url || args[0] || '';
      const urlString = typeof url === 'string' ? url : url.toString();
      
      if (urlString.includes('.wasm') || urlString.includes('WebAssembly')) {
        console.warn('🚫 Blocked WASM fetch:', urlString);
        return Promise.reject(new Error('WASM fetch blocked'));
      }
      
      return originalFetch.apply(this, args);
    };
    
    console.log('🛡️ All WebAssembly protections active');
  </script>
  
  <!-- React app will be injected here by Vite -->
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
