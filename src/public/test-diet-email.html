<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diet Email Testing - Resilio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    h1 {
      color: #667eea;
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      color: #555;
      margin-bottom: 5px;
      font-weight: 500;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .log {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 6px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .log-entry {
      padding: 5px;
      margin-bottom: 5px;
      border-left: 3px solid #667eea;
      padding-left: 10px;
    }

    .log-success {
      border-color: #10b981;
      background: #d1fae5;
      color: #065f46;
    }

    .log-error {
      border-color: #ef4444;
      background: #fee2e2;
      color: #991b1b;
    }

    .log-info {
      border-color: #3b82f6;
      background: #dbeafe;
      color: #1e40af;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      color: white;
    }

    .stat-value {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🍎 Diet Email Testing Dashboard</h1>
      <p class="subtitle">Test email queue system for Diet Plan reminders</p>
    </div>

    <div class="grid">
      <!-- Queue Email Test -->
      <div class="card">
        <h2>📧 Queue Test Email</h2>
        <form id="queueForm">
          <div class="form-group">
            <label>Your Email</label>
            <input type="email" id="userEmail" placeholder="your.email@example.com" required>
          </div>
          <div class="form-group">
            <label>Subject</label>
            <input type="text" id="subject" value="🍎 Diet Reminder Test" required>
          </div>
          <div class="form-group">
            <label>Message Body</label>
            <textarea id="body" required>Hello!

This is a test diet reminder from Resilio.

Your scheduled food items:
• Apple (95 cal)
• Banana (105 cal)

Total Calories: 200 kcal

Stay healthy! 🍎</textarea>
          </div>
          <div class="form-group">
            <label>Scheduled Date</label>
            <input type="date" id="scheduledDate" required>
          </div>
          <div class="form-group">
            <label>Scheduled Time</label>
            <input type="time" id="scheduledTime" required>
          </div>
          <button type="submit">Queue Email</button>
        </form>
      </div>

      <!-- Process Queue Test -->
      <div class="card">
        <h2>⚡ Process Queue</h2>
        <div class="form-group">
          <label>Cron API Key</label>
          <input type="password" id="cronApiKey" placeholder="Your CRON_API_KEY">
        </div>
        <button id="processBtn">Process Pending Emails Now</button>
        <button id="refreshStatusBtn" style="margin-top: 10px; background: #10b981;">Refresh Queue Status</button>
      </div>
    </div>

    <!-- Status Display -->
    <div class="status">
      <h2>📊 Queue Status</h2>
      <div class="stats-grid" id="stats">
        <div class="stat-card">
          <div class="stat-value" id="totalCount">-</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="pendingCount">-</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="dueNowCount">-</div>
          <div class="stat-label">Due Now</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="sentCount">-</div>
          <div class="stat-label">Sent</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="failedCount">-</div>
          <div class="stat-label">Failed</div>
        </div>
      </div>
      
      <h3 style="margin-top: 25px; margin-bottom: 15px; color: #333;">Activity Log</h3>
      <div class="log" id="log">
        <div class="log-entry log-info">Waiting for actions...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin.replace('makeproxy-c', 'oq6ckusac6xmjcpayiymr7v26j45ia544f2m4arqewpf5q').replace('.figma.site', '.supabase.co') + '/functions/v1/make-server-40d4d8fd';
    
    const log = document.getElementById('log');
    
    function addLog(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      log.insertBefore(entry, log.firstChild);
    }

    // Set default date/time (2 minutes from now)
    const now = new Date();
    now.setMinutes(now.getMinutes() + 2);
    document.getElementById('scheduledDate').value = now.toISOString().split('T')[0];
    document.getElementById('scheduledTime').value = now.toTimeString().slice(0, 5);

    // Get access token from localStorage
    function getAccessToken() {
      return localStorage.getItem('accessToken');
    }

    // Queue email form
    document.getElementById('queueForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const accessToken = getAccessToken();
      if (!accessToken) {
        addLog('❌ No access token found. Please login first.', 'error');
        alert('Please login to the app first!');
        return;
      }

      const data = {
        email: document.getElementById('userEmail').value,
        subject: document.getElementById('subject').value,
        body: document.getElementById('body').value,
        scheduledDate: document.getElementById('scheduledDate').value,
        scheduledTime: document.getElementById('scheduledTime').value,
      };

      addLog('📤 Queueing email...', 'info');
      
      try {
        const response = await fetch(`${API_BASE}/email/queue`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`,
          },
          body: JSON.stringify(data),
        });

        const result = await response.json();
        
        if (response.ok && result.success) {
          addLog(`✅ Email queued successfully! ID: ${result.emailId}`, 'success');
          refreshStatus();
        } else {
          addLog(`❌ Failed to queue email: ${result.error}`, 'error');
        }
      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
      }
    });

    // Process queue
    document.getElementById('processBtn').addEventListener('click', async () => {
      const cronApiKey = document.getElementById('cronApiKey').value;
      
      if (!cronApiKey) {
        addLog('❌ Please enter CRON_API_KEY', 'error');
        return;
      }

      addLog('⚡ Processing pending emails...', 'info');
      
      try {
        const response = await fetch(`${API_BASE}/email/queue/process?api_key=${cronApiKey}`, {
          method: 'POST',
        });

        const result = await response.json();
        
        if (response.ok && result.success) {
          addLog(`✅ Processed ${result.processed} emails, ${result.failed} failed`, 'success');
          refreshStatus();
        } else {
          addLog(`❌ Failed: ${result.error}`, 'error');
        }
      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
      }
    });

    // Refresh status
    document.getElementById('refreshStatusBtn').addEventListener('click', refreshStatus);

    async function refreshStatus() {
      addLog('🔄 Refreshing queue status...', 'info');
      
      try {
        const response = await fetch(`${API_BASE}/email/queue/status`);
        const result = await response.json();
        
        if (response.ok && result.success) {
          document.getElementById('totalCount').textContent = result.summary.total;
          document.getElementById('pendingCount').textContent = result.summary.pending;
          document.getElementById('dueNowCount').textContent = result.summary.dueNow;
          document.getElementById('sentCount').textContent = result.summary.sent;
          document.getElementById('failedCount').textContent = result.summary.failed;
          
          addLog(`✅ Status updated: ${result.summary.dueNow} emails due now`, 'success');
          
          if (result.dueNow && result.dueNow.length > 0) {
            addLog(`⏰ Due now: ${result.dueNow.map(e => e.subject).join(', ')}`, 'info');
          }
        } else {
          addLog(`❌ Failed to fetch status`, 'error');
        }
      } catch (error) {
        addLog(`❌ Error: ${error.message}`, 'error');
      }
    }

    // Auto-refresh status every 10 seconds
    setInterval(refreshStatus, 10000);
    
    // Initial status load
    refreshStatus();
  </script>
</body>
</html>
